name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Verify tag and manifest versions
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          test "$(sed -n 's/^version = "\([^"]*\)"/\1/p' extension.toml | head -1)" = "$version"
          test "$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -1)" = "$version"
          test "$(sed -n 's/^version = "\([^"]*\)"/\1/p' server/Cargo.toml | head -1)" = "$version"

  build-server:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            target: aarch64-apple-darwin
            archive: tar.gz
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            archive: tar.gz
          - runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - runner: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
          - runner: windows-2025
            target: x86_64-pc-windows-msvc
            archive: zip
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server
          key: ${{ matrix.target }}
      - name: Build server
        run: cargo build --release --locked --manifest-path server/Cargo.toml --target ${{ matrix.target }}
      - name: Package Unix binary
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          mkdir -p dist/package
          cp "server/target/${{ matrix.target }}/release/inline-sql-lsp" dist/package/
          tar -C dist/package -czf "dist/inline-sql-lsp-${{ matrix.target }}.tar.gz" inline-sql-lsp
      - name: Package Windows binary
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/package
          Copy-Item "server/target/${{ matrix.target }}/release/inline-sql-lsp.exe" dist/package/
          Compress-Archive -Path dist/package/inline-sql-lsp.exe -DestinationPath "dist/inline-sql-lsp-${{ matrix.target }}.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: inline-sql-lsp-${{ matrix.target }}
          path: dist/inline-sql-lsp-${{ matrix.target }}.*
          if-no-files-found: error

  publish:
    needs: build-server
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
